<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Portfolio Hub</title>
  <style>
    :root {
      --primary: #2563eb; --dark: #0f172a; --light: #f8fafc; --gray: #64748b; --card-bg: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--light); color: var(--dark); line-height: 1.6; }
    
    header.hero { text-align: center; padding: 120px 20px; background: linear-gradient(135deg, #1e293b, var(--dark)); color: white; }
    header.hero h1 { font-size: 2.8rem; margin-bottom: 12px; }
    header.hero p { font-size: 1.3rem; color: #cbd5e1; margin-bottom: 24px; }
    
    .btn { padding: 12px 24px; text-decoration: none; border-radius: 6px; display: inline-block; font-weight: 600; cursor: pointer; border: none; font-size: 0.95rem; transition: background 0.2s; }
    .btn.primary { background-color: var(--primary); color: white; }
    .btn.primary:hover { background-color: #1d4ed8; }
    .btn.secondary { background-color: var(--gray); color: white; }
    .btn.secondary:hover { background-color: #475569; }
    
    .container { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }
    h2 { text-align: center; font-size: 2.2rem; margin-bottom: 40px; position: relative; }
    h2::after { content: ''; display: block; width: 60px; height: 4px; background: var(--primary); margin: 12px auto 0; border-radius: 2px; }
    
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
    .project-card { background: var(--card-bg); padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
    .project-card h3 { font-size: 1.4rem; margin-bottom: 10px; }
    .project-card p { color: var(--gray); margin-bottom: 20px; }
    .tags { margin-bottom: 20px; }
    .tag { background: #e2e8f0; padding: 4px 10px; font-size: 0.8rem; font-weight: 500; border-radius: 4px; margin-right: 6px; display: inline-block; }
    
    .contact-form { display: flex; flex-direction: column; gap: 16px; max-width: 520px; margin: 0 auto; }
    .contact-form input, .contact-form textarea { padding: 14px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; width: 100%; transition: border 0.2s; }
    .contact-form input:focus, .contact-form textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
    .form-status { text-align: center; margin-top: 20px; font-weight: 600; font-size: 1.05rem; }
  </style>
</head>
<body>

  <header class="hero">
    <h1>Hi, I'm a Full-Stack Developer</h1>
    <p>Engineering responsive frontends linked to reliable database ecosystems.</p>
    <a href="#projects" class="btn primary">Examine My Workspace</a>
  </header>

  <section id="projects" class="container">
    <h2>Featured Project Deployments</h2>
    <div class="projects-grid" id="projects-container">
      <p style="text-align: center; grid-column: 1/-1; color: var(--gray);">Retrieving records from systemic architecture layers...</p>
    </div>
  </section>

  <section id="contact" class="container">
    <h2>Initiate Contact Integration</h2>
    <form id="contactForm" class="contact-form">
      <input type="text" id="name" placeholder="Your Name" required>
      <input type="email" id="email" placeholder="Your Email" required>
      <textarea id="message" placeholder="Type your core communication requirements here..." rows="5" required></textarea>
      <button type="submit" class="btn primary">Transmit Signal</button>
    </form>
    <p id="formStatus" class="form-status"></p>
  </section>

  <script>
    async function loadClientProjects() {
      const targetElement = document.getElementById('projects-container');
      try {
        const response = await fetch('/api/projects');
        const datasets = await response.json();
        targetElement.innerHTML = '';
        
        datasets.forEach(item => {
          const block = document.createElement('div');
          block.className = 'project-card';
          block.innerHTML = `
            <div>
              <h3>${item.title}</h3>
              <p>${item.description}</p>
              <div class="tags">${item.technologies.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </div>
            <div>
              <a href="${item.liveLink}" target="_blank" class="btn primary">Live Link</a>
              <a href="${item.githubLink}" target="_blank" class="btn secondary">Codebase</a>
            </div>
          `;
          targetElement.appendChild(block);
        });
      } catch (err) {
        targetElement.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:red;">System sync timeout error.</p>';
      }
    }

    document.getElementById('contactForm').addEventListener('submit', async function(event) {
      event.preventDefault();
      const visualFeedback = document.getElementById('formStatus');
      visualFeedback.textContent = 'Transmitting execution stream...';
      visualFeedback.style.color = 'var(--gray)';

      try {
        const structuralResponse = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value
          })
        });

        if (structuralResponse.ok) {
          visualFeedback.textContent = 'Package confirmed. Storage routine completed.';
          visualFeedback.style.color = 'green';
          document.getElementById('contactForm').reset();
        } else {
          throw new Error();
        }
      } catch (error) {
        visualFeedback.textContent = 'Network transit disruption encountered.';
        visualFeedback.style.color = 'orange';
      }
    });

    window.addEventListener('DOMContentLoaded', loadClientProjects);
  </script>
</body>
</html>
